name: "Setup .Net and Workloads"
description: "Sets up .NET SDK 10 and installs the specified workloads"
inputs:
  workloads:
    description: 'The workloads array to install'
    required: false 
    default: ""
runs:
  using: "composite"
  steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v5.0.1
      with:
        dotnet-version: '10.0.100'

    - name: Determine .NET paths
      if: ${{ inputs.workloads != '' }}
      id: dotnet-paths
      shell: pwsh
      run: |
        # Get the actual dotnet root path
        $dotnetRoot = if ($env:DOTNET_ROOT) { $env:DOTNET_ROOT } else { (Get-Command dotnet).Source | Split-Path -Parent }
        echo "root=$dotnetRoot" >> $env:GITHUB_OUTPUT
        
        # Generate sanitized cache key
        $workloads = "${{ inputs.workloads }}"
        $sanitized = $workloads -replace '[,\s]+', '-'
        echo "sanitized=$sanitized" >> $env:GITHUB_OUTPUT

    - name: Cache .NET workloads
      if: ${{ inputs.workloads != '' }}
      uses: actions/cache@v5.0.3
      id: workload-cache
      with:
        path: |
          ${{ steps.dotnet-paths.outputs.root }}/sdk-manifests
          ${{ steps.dotnet-paths.outputs.root }}/packs
          ${{ steps.dotnet-paths.outputs.root }}/template-packs
          ${{ steps.dotnet-paths.outputs.root }}/metadata/temp
        key: dotnet-workloads-${{ runner.os }}-10.0.100-${{ steps.dotnet-paths.outputs.sanitized }}
        restore-keys: |
          dotnet-workloads-${{ runner.os }}-10.0.100-

    - name: Install Workloads
      if: ${{ inputs.workloads != '' && steps.workload-cache.outputs.cache-hit != 'true' }}
      shell: pwsh
      run: |
        $workloads = "${{ inputs.workloads }}".Split(' ')
        foreach ($workload in $workloads) {
          dotnet workload install $workload
        }